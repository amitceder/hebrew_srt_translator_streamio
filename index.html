<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid SRT Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drop-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; }
        .drag-over { border-color: #f59e0b !important; background-color: #fffbeb !important; }
        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.1); width: 20px; height: 20px; border-radius: 50%;
            border-left-color: #f59e0b; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-xl text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Hybrid SRT</h1>
        
        <div id="drop-zone" class="relative border-4 border-dashed border-gray-200 rounded-lg p-12 cursor-pointer mt-4">
            <div id="shield" class="drop-shield"></div>
            <input type="file" id="file-input" class="hidden" accept=".srt">
            <p class="text-gray-600">Drop <span class="text-orange-600 font-bold">.srt</span> here</p>
        </div>

        <div id="progress-area" class="hidden mt-8 space-y-4">
            <div class="flex justify-between text-sm font-bold text-blue-600">
                <span id="google-label">Phase 1: Google Translating...</span>
                <span id="google-pct">0%</span>
            </div>
            <div class="flex justify-between text-sm font-bold text-orange-600">
                <span id="ai-label">Phase 2: AI Polishing…</span>
                <span id="percent">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
                <div id="bar" class="bg-orange-500 h-4 rounded-full transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>

        <div id="google-done" class="hidden mt-6 p-4 bg-green-50 border border-green-200 rounded-lg flex items-center justify-between">
            <span class="text-green-700 font-bold text-sm">✓ Baseline Ready</span>
            <button id="dl-google" class="bg-green-600 text-white px-4 py-2 rounded text-sm font-bold">Download Literal</button>
        </div>

        <div id="dl-ai-container" class="hidden mt-6">
            <button id="dl-ai" class="w-full bg-orange-600 text-white font-bold py-4 rounded-lg shadow-xl hover:bg-orange-700">
                Download Final AI Polished (No Missing Lines)
            </button>
        </div>
    </div>

    <script>
        const shield = document.getElementById('shield');
        const fileInput = document.getElementById('file-input');
        window.googleDone = false;

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
            window.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); });
            shield.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); });
        });

        shield.onclick = () => fileInput.click();
        fileInput.onchange = (e) => { if (e.target.files.length) handleUpload(e.target.files[0]); };
        shield.addEventListener('drop', (e) => { handleUpload(e.dataTransfer.files[0]); });

        async function handleUpload(file) {
            window.googleDone = false;
            document.getElementById('progress-area').classList.remove('hidden');
            document.getElementById('google-done').classList.add('hidden');
            document.getElementById('dl-ai-container').classList.add('hidden');
            document.getElementById('bar').style.width = "0%";
            try {
                const cfgRes = await fetch('/config');
                const cfg = await cfgRes.json();
                document.getElementById('ai-label').innerText = "Phase 2: AI Polishing (Groq: " + cfg.groq_model + ", " + cfg.ai_batch_size + "-line context)...";
            } catch (_) {
                document.getElementById('ai-label').innerText = "Phase 2: AI Polishing...";
            }
            const formData = new FormData();
            formData.append('file', file);

            const response = await fetch('/translate', { method: 'POST', body: formData });
            const data = await response.json();

            const poller = setInterval(async () => {
                const res = await fetch('/status/' + data.job_id);
                const status = await res.json();

                document.getElementById('google-pct').innerText = (status.google_progress || 0) + "%";

                if (status.google_status === 'completed' && !window.googleDone) {
                    window.googleDone = true;
                    document.getElementById('google-label').innerText = "✓ Phase 1 Complete";
                    document.getElementById('google-done').classList.remove('hidden');
                    document.getElementById('dl-google').onclick = () => download(status.google_result, "GOOGLE_" + file.name);
                }

                document.getElementById('bar').style.width = (status.ai_progress || 0) + "%";
                document.getElementById('percent').innerText = (status.ai_progress || 0) + "%";

                if (status.ai_status === 'completed') {
                    clearInterval(poller);
                    document.getElementById('ai-label').innerText = "✓ Phase 2 Complete";
                    document.getElementById('dl-ai-container').classList.remove('hidden');
                    document.getElementById('dl-ai').onclick = () => download(status.ai_result, "AI_POLISHED_" + file.name);
                }
            }, 2000);
        }

        function download(content, filename) {
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; a.click();
        }
    </script>
</body>
</html>
